<style>

}
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #dfe6ec;
}

/* HEADER */
.header {
  background: #09458f;
  color: white;
  padding: 1px 20px;
  text-align: center;
  /* Tambahkan ini supaya logo bisa diatur posisinya terhadap header */
  position: relative; 
  min-height: 30px; /* Sesuaikan dengan tinggi logo kamu */
 }

/* HEADER UTAMA */
#main-header {
  background: #09458f;
  color: white;
  padding: 10px 20px;
  text-align: center;
  position: relative; 
  min-height: 30px; /* Menjaga tinggi kotak biru tetap stabil */
  
  /* Tambahkan ini agar semua isi di dalamnya selalu di tengah */
  display: flex;
  flex-direction: column;   /* Menyusun h1 dan p secara vertikal */
  justify-content: center;  /* Pusatkan secara vertikal (atas-bawah) */
  align-items: center;      /* Pusatkan secara horizontal (kiri-kanan) */
}

/* LOGO (Hanya muncul di halaman depan) */
#logo-utama {
  position: absolute;  /* Absolute agar tidak memakan space saat muncul */
  left: 1px;
  top: 50%;
  transform: translateY(-50%);
  height: 100px;
  width: auto;
}
@media (max-width: 768px) {
  #logo-utama {
    height: 20px; /* Ukuran mengecil jadi setengahnya saat di HP */
    left: 10px;
  }
}

/* TULISAN SIMULASI (Halaman 1 & 2) */
#header-sub {
  margin-bottom: 4px;
  padding: 0;
  width: 100%; /* Memastikan teks punya ruang penuh untuk di-center */
  font-size: 18px;
  font-weight: normal;
}

/* JUDUL WELCOME */
#header-text {
  margin: 0 0 4px 0; /* Jarak bawah hanya ada jika WELCOME muncul */
}

.header h1 {
  margin-top: 7px;
  font-size: 40px;
  letter-spacing: 3px;
  margin-bottom: 1px;
}

.header p {
  margin-top: 1px;
  font-size: 20px;
  color: #ffffff;
  opacity: 1.0;
}
/* HOME CARD */
.box {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 30px 20px;
}

.card-home {
  background: white;
  padding: 40px 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 800px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

/* TITLE */
.main-title {
  font-size: 40px;
  font-weight: bold;
  margin-bottom: 10px;
}

.sub-title {
  font-size: 30px;
  font-weight: bold;
  color: #000000;
  margin-bottom: 20px;
  text-align: center;
}

.line {
  width: 75%;
  height: 4px;
  margin: 20px auto;
  background: linear-gradient(to right, #74b9ff, #f3719f);
  border-radius: 5px;
}

/* PAKET */
.pilih-title {
  font-size: 25px;
  font-weight: bold;
  margin-bottom: 10px;
  letter-spacing: 1px;
}

/* BUTTON PINK */
.button-container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  /* Tambahkan padding di container agar tombol tidak mepet ke dinding layar */
  padding: 20px;
  /* Jarak horizontal antar tombol */
  gap: 15px; 
}

.btn {
  background: #ff6ca0;
  color: white;
  border: none;
  
  /* UKURAN HARUS SAMA BESAR */
  width: 110px; 
  height: 40px;
  
  /* SOLUSI JARAK ATAS-BAWAH: */
  /* Jika row-gap tidak jalan, margin ini akan memaksanya */
  margin-bottom: 0px; 
  
  border-radius: 30px;
  cursor: pointer;
  font-weight: bold;
  font-size: 15px;
  box-shadow: 0 8px 10px rgba(0, 0, 0, 0.3);
  transition: 0.2s;

  /* Memastikan teks di tengah */
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.btn:hover {
  background: #e84393;
  transform: translateY(-5px);
  box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
}

/* CBT Layout */
.container { display: flex; min-height: 85vh; }

.sidebar-wrapper { 
  width: 180px; 
  background: #ecf0f1; 
  padding: 10px; 
  border-right: 1px solid #ddd; 
}
.sidebar-title { background: #2c3e50; color: white; padding: 10px; text-align: center; border-radius: 5px; margin-bottom: 15px; font-weight: bold; font-size: 13px; }
.progress-container { width: 100%; height: 8px; background: #ddd; border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
.progress-bar { height: 100%; width: 0%; background: #2ecc71; transition: 0.3s; }

.sidebar { 
  display: grid; 
  grid-template-columns: repeat(5, 1fr); 
  gap: 4px; 
}

.nomor { 
  background: #bdc3c7; 
  padding: 6px 0; 
  text-align: center; 
  border-radius: 3px; 
  cursor: pointer; 
  font-size: 13px; 
  font-weight: bold;
  min-height: 25px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.sudah { background: #2ecc71; color: white; }
.aktifNomor { background: #3498db; color: white; border: 1px solid #2c3e50; }

/* Konten Soal */
.content { flex: 1; padding: 40px; background: white; }
#timer { font-size: 24px; margin-bottom: 15px; font-weight: bold;text-align: right; color: #2c3e50; }
.timer-habis { color: #e74c3c !important; }

.soal { 
  font-size: 30px; 
  margin-bottom: 35px; 
  line-height: 2; 
  color: #000000; 
}

ruby rt { font-size: 0.6em; }

#soal ruby rt {
  font-size: 17px;
  color: #2c2c2c;
  margin-bottom: 3px;
}

.pilihan ruby rt {
  font-size: 18px;
  color: #202020;
  margin-bottom: 3px;
}

.pilihan {
  width: 100%;
  padding: 18px;
  margin: 10px 0;
  text-align: left;
  border-radius: 10px;
  border: 1px solid #ccc;
  background: #fff;
  cursor: pointer;
  font-size: 24px; 
  display: flex;
  align-items: flex-start;
  transition: 0.2s;
}
.pilihan:hover { background: #f1f2f6; border-color: #3498db; }
.aktif { background: #d0e6ff !important; border: 2px solid #3498db !important; font-weight: bold; }
.label-opsi { font-weight: bold; margin-right: 20px; min-width: 30px; color: #2980b9; }

#hasil {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #f5f6fa;
  z-index: 9999;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#gambarSoal img {
  max-width: 450px;

  margin: 0 auto;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);

.review-item { text-align: left; border-bottom: 2px solid #eee; padding: 15px 0; }
.status-benar { color: #2ecc71; font-weight: bold; }
.status-salah { color: #e74c3c; font-weight: bold; }
.kunci-jawaban { background: #e8f5e9; padding: 10px; border-radius: 5px; margin-top: 5px; font-size: 0.9em; }

.sidebar-wrapper {

.sidebar-tutup {
  width: 0 !important;
  padding: 0 !important;
  margin: 0 !important;
  opacity: 0;
  pointer-events: none;
}

/* Memastikan konten soal mengambil sisa ruang */
.content {
  flex: 1; 
  transition: all 0.3s ease;
}

</style>

const paket4 = []; const paket5 = []; const paket6 = []; const paket7 = []; // Isi sesuai kebutuhan
const paket8 = []; const paket9 = [];
const paket10 = [];


function start(p) {
  waktu = 70 * 60;
  index = 0;
  clearInterval(timer);

  if (p === 1) soal = [...paket1];
  else if (p === 2) soal = [...paket2];
  else if (p === 3) soal = [...paket3];
  else if (p === 4) soal = [...paket4];
  else if (p === 5) soal = [...paket5];
  else if (p === 6) soal = [...paket6];
  else if (p === 7) soal = [...paket7];
  else if (p === 8) soal = [...paket8];
  else if (p === 9) soal = [...paket9];
  else if (p === 10) soal = [...paket10];
  else soal = [];

  document.getElementById("home").style.display = "none";
  document.getElementById("cbt").style.display = "block";
  document.getElementById("header-text").style.display = "none"; 
  document.getElementById("logo-utama").style.display = "none";

  
  while (soal.length < 40) {
    soal.push({ t: "(Soal Belum Tersedia)", p: ["-", "-", "-"], b: 0 });
  }

  jawaban = new Array(soal.length).fill(undefined);
  buatNomor();
  tampil();
  startTimer();
}

function buatNomor() {
  let h = "";
  for (let i = 0; i < soal.length; i++) {
    h += `<div class="nomor" id="no${i}" onclick="go(${i})">${i + 1}</div>`;
  }
  document.getElementById("sidebar").innerHTML = h;
}

function tampil() {
  document.getElementById("soal").innerHTML = `<b>問${index + 1}：</b>${soal[index].t}`;
  document.getElementById("gambarSoal").innerHTML = soal[index].img ? `<img src="${soal[index].img}">` : "";

  for (let i = 0; i < 3; i++) {
    document.getElementById("opt" + i).innerHTML = soal[index].p[i];
    document.getElementById("btn" + i).classList.toggle("aktif", jawaban[index] === i);
  }

  let n = document.getElementsByClassName("nomor");
  for (let i = 0; i < n.length; i++) {
    n[i].classList.remove("aktifNomor");
    n[i].classList.toggle("sudah", jawaban[i] !== undefined);
    if (i === index) n[i].classList.add("aktifNomor");
  }

  let sudahJawab = jawaban.filter(x => x !== undefined).length;
  document.getElementById("bar").style.width = (sudahJawab / soal.length * 100) + "%";
  document.getElementById("btnPrev").style.display = index === 0 ? "none" : "inline-block";
  document.getElementById("btnNext").style.display = index === soal.length - 1 ? "none" : "inline-block";
}

function jawab(i) { jawaban[index] = i; tampil(); }
function next() { if (index < soal.length - 1) { index++; tampil(); } }
function prev() { if (index > 0) { index--; tampil(); } }
function go(i) { index = i; tampil(); }

function startTimer() {
  timer = setInterval(() => {
    if (waktu <= 0) { clearInterval(timer); end(); return; }
    let m = Math.floor(waktu / 60), s = waktu % 60;
    document.getElementById("timer").innerText = `Waktu: ${m}:${String(s).padStart(2, '0')}`;
    if (waktu <= 300) document.getElementById("timer").classList.add("timer-habis");
    waktu--;
  }, 1000);
}

function finishUjian() {
  let belum = jawaban.filter(x => x === undefined).length;
  if (confirm(belum > 0 ? `Masih ada ${belum} soal belum dijawab. Selesai?` : "Selesai ujian?")) end();
}

function end() {
  clearInterval(timer);
  let benar = 0, salah = 0, kosong = 0;
  soal.forEach((s, i) => {
    if (jawaban[i] === s.b) benar++;
    else if (jawaban[i] === undefined) kosong++;
    else salah++;
  });

  let totalSkor = Math.round((benar / soal.length) * 250);
  let persentase = Math.round((benar / soal.length) * 100);
  let statusColor = persentase >= 66 ? "#2ecc71" : "#e74c3c";

  const layarHasil = document.getElementById("hasil");
  layarHasil.style.display = "flex";
  layarHasil.innerHTML = `
  
    <div style="font-size: 20px; padding: 40px; border-radius: 20px; background: white; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 90%; max-width: 450px;">
      <h1>HASIL UJIAN</h1>
      <div style="font-size: 50px; font-weight: bold; color: #2980b9;">${totalSkor}/250</div>
      <div style="font-size: 24px; margin-bottom: 20px;">${persentase}%</div>
      <div style="font-size: 20px; text-align: center; background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 25px;">
        Benar: <b style="color:#2ecc71">${benar}</b> | Salah: <b style="color:#e74c3c">${salah}</b> | Tidak Terjawab: <b style="color:#e74c3c">${kosong}</b>
      </div>
      <h2 style="font-size: 35px; letter-spacing: 2px; color: ${statusColor};">${persentase >= 66 ? "PASSED 🎉" : "FAILED"}</h2>
      <button class="btn" onclick="location.reload()" style="width:100%; margin-bottom:10px;">KEMBALI KE BERANDA</button>
      <button class="btn" onclick="tampilkanReview()" style="width:100%; background:#3498db;">REVIEW JAWABAN</button>
    </div>
  `;
}

function tampilkanReview() {
  let reviewHTML = `<div style="padding: 20px; background: white; width: 95%; max-width: 600px; height: 80vh; overflow-y: auto; border-radius: 20px;">
    <h2 style="text-align:center;">Review Jawaban</h2><hr>`;
  
  soal.forEach((s, i) => {
    if (s.t === "(Soal Belum Tersedia)") return;
    let isBenar = jawaban[i] === s.b;
    reviewHTML += `
      <div class="review-item">
        <p><b>No ${i + 1}:</b> ${s.t}</p>
        <div class="${isBenar ? 'status-benar' : 'status-salah'}">${isBenar ? '✅ BENAR' : (jawaban[i] === undefined ? '⚪ KOSONG' : '❌ SALAH')}</div>
        <div class="kunci-jawaban">
          <b>Kunci:</b> ${s.p[s.b]}<br>
          <b>Jawaban Kamu:</b> ${jawaban[i] !== undefined ? s.p[jawaban[i]] : "(Tidak dijawab)"}
        </div>
      </div>`;
  });

  reviewHTML += `<button class="btn" onclick="end()" style="width:100%; margin-top:20px; background:#7f8c8d;">TUTUP REVIEW</button></div>`;
  document.getElementById("hasil").innerHTML = reviewHTML;
}
function toggleSidebar() {
  const sidebar = document.getElementById("sidebar-konten");
  const icon = document.getElementById("icon-toggle");
  const text = document.getElementById("text-toggle");
  
  // Perintah untuk menyembunyikan/memunculkan
  sidebar.classList.toggle("sidebar-tutup");
  
  // Mengubah tulisan di tombol secara otomatis
  if (sidebar.classList.contains("sidebar-tutup")) {
    icon.innerHTML = "☰";
    text.innerHTML = "Tampilkan";
  } else {
    icon.innerHTML = "✕";
    text.innerHTML = "Tutup";
  }
}
</script>
